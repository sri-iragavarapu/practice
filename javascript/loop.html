        let cart = [];
        
        
    details.forEach(function(fun, index){
    document.getElementById("cardscontainer").innerHTML += ` 
        <div class = "card">    
            <img src = ${fun.image} alt="sri profile">
            <p><b>${fun.types}</b></p>
            <p><b>Price:</b><b>₹${fun.price}</b></p>
            <button><b>Buy Now<b></button><br>
            <button onclick = "addcartfunction(${index})"><b>Add Cart</b></button>
            <button onclick="removecartfunction(${index})"><b>Remove Cart</b></button>
            </div>
            `;
        });
        function addcartfunction(index){
            cart.push(details[index]);
            showtotal();
        }
        function removecartfunction(index){

    const itemIndex = cart.findIndex(function(item){
        return item === details[index];
    });

    if(itemIndex !== -1){
        cart.splice(itemIndex, 1);
    }

    showtotal();
}
        function showtotal(){
            let total = 0;
            cart.forEach(function(item){
                total = total + item.price;
            });
            document.getElementById("total").innerText = "Total:₹" + total
        }  
    </script>
